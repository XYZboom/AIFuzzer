# 临时运行配置 — 50 轮 PyTorch fuzzing 验证
# 用法: ./gradlew run --args="-c configs/run-50-pytorch.yaml"

run:
  description: "Verification: 50 rounds PyTorch with INTERPOLATE/CUMPROD fixes"
  seed: null
  output_dir: "./reports"
  log_level: "info"

generator:
  min_nodes_per_graph: 20
  max_nodes_per_graph: 80
  min_inputs: 2
  max_inputs: 15
  min_input_ndim: 1
  max_input_ndim: 4
  strategy: "random"
  template_dir: "./templates"

  ops:
    include_all: true
    include: []
    exclude: []

  mutation:
    enabled: false
    rate: 0.1

backends:
  enabled: ["pytorch"]

  tvm:
    python: "/home/xyzboom/Programs/miniconda3/envs/aifuzzer/bin/python3"
    timeout_seconds: 60
    keep_artifacts: false
    work_dir: "%TEMP%/aiFuzzer_tvm"
    dtype: "float32"
    shape_rank: 3

  pytorch:
    python: "/home/xyzboom/Programs/miniconda3/envs/aifuzzer/bin/python3"
    timeout_seconds: 120
    keep_artifacts: false
    work_dir: "%TEMP%/aiFuzzer_pytorch"
    dtype: "float32"
    device: "cpu"
    compile_mode: "default"

  onnx:
    python: "/home/xyzboom/Programs/miniconda3/envs/aifuzzer/bin/python3"
    timeout_seconds: 60
    opset_version: 21
    ir_version: 8

  iree:
    timeout_seconds: 120
    target: "llvm-cpu"
    driver: "local-sync"
    mlir_flags: []

bug_collector:
  enabled: true
  ignore_patterns: []
  output_dir: "./reports"

pipeline:
  workers: 1
  batch_size: 50
  run_timeout_seconds: 120
