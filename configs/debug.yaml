# Debug 配置：遇到错误立即终止
# 用法: ./gradlew run --args="--config configs/debug.yaml"

run:
  description: "Debug run - fail fast on any error"
  logLevel: debug

generator:
  minNodesPerGraph: 3
  maxNodesPerGraph: 8
  minInputs: 1
  maxInputs: 3
  graphCount: 1

pipeline:
  workers: 1
  batchSize: 10
  failFast: true

backends:
  enabled:
    - tvm
  tvm:
    mode: daemon
    daemonCount: 1
    timeoutSeconds: 30

bugCollector:
  enabled: true